<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HUD Radar Widget</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .hud-container {
      position: relative;
      width: 600px;
      height: 600px;
    }

    /* ── Slow full-HUD rotation ── */
    .hud-rotate {
      animation: rotateHud 60s linear infinite;
      transform-origin: 300px 300px;
    }
    @keyframes rotateHud {
      to { transform: rotate(360deg); }
    }

    /* ── Radar sweep ── */
    .sweep {
      transform-origin: 300px 300px;
      animation: sweepSpin 4s linear infinite;
    }
    @keyframes sweepSpin {
      to { transform: rotate(360deg); }
    }

    /* ── Outer-ring lock-on pulse ── */
    .pulse-ring {
      animation: lockPulse 3.5s ease-in-out infinite;
    }
    @keyframes lockPulse {
      0%, 80%, 100% { opacity: 0.55; }
      90% { opacity: 1; }
    }

    /* ── Glow filter for sweep trail ── */
    .sweep-glow {
      filter: url(#sweepBlur);
      opacity: 0.45;
      transform-origin: 300px 300px;
      animation: sweepSpin 4s linear infinite;
    }

    /* ── Data-block blink ── */
    .data-block {
      animation: blinkBlock 2.8s ease-in-out infinite alternate;
    }
    @keyframes blinkBlock {
      0%, 60% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    /* ── Center ping ── */
    .center-ping {
      transform-origin: 300px 300px;
      animation: pingPulse 2s ease-out infinite;
    }
    @keyframes pingPulse {
      0%   { r: 6; opacity: 0.9; }
      100% { r: 22; opacity: 0; }
    }
  </style>
</head>
<body>

<div class="hud-container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
    <defs>
      <!-- Glow blur for sweep trail -->
      <filter id="sweepBlur" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
      </filter>

      <!-- Soft glow for outer ring pulse -->
      <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>

      <!-- Sweep cone gradient -->
      <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#dc2626" stop-opacity="0" />
        <stop offset="100%" stop-color="#dc2626" stop-opacity="0.85" />
      </linearGradient>
    </defs>

    <!-- ════════════════════════════════════════════ -->
    <!-- SLOW-ROTATING GROUP (entire HUD)            -->
    <!-- ════════════════════════════════════════════ -->
    <g class="hud-rotate">

      <!-- ── Outer segmented bold ring (pulse) ── -->
      <g class="pulse-ring" filter="url(#outerGlow)">
        <!-- 8 arcs, each 35° with 10° gaps -->
        <circle cx="300" cy="300" r="270" fill="none" stroke="#dc2626" stroke-width="5"
          stroke-dasharray="165 43.5" stroke-linecap="butt" opacity="0.8" />
        <!-- Secondary outer ring, offset -->
        <circle cx="300" cy="300" r="262" fill="none" stroke="#dc2626" stroke-width="1.5"
          stroke-dasharray="82 25" stroke-linecap="butt" opacity="0.5" />
      </g>

      <!-- ── Degree tick marks (white, outer) ── -->
      <g stroke="#fff" stroke-width="1" opacity="0.45">
        <script type="text/javascript">/* generated below */</script>
      </g>
      <!-- We'll draw ticks procedurally with lines -->
      <g id="degree-ticks"></g>

      <!-- ── Middle rings ── -->
      <circle cx="300" cy="300" r="210" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.35"
        stroke-dasharray="6 8" />
      <circle cx="300" cy="300" r="160" fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.3"
        stroke-dasharray="4 10" />
      <circle cx="300" cy="300" r="110" fill="none" stroke="#dc2626" stroke-width="0.6" opacity="0.28"
        stroke-dasharray="3 12" />
      <circle cx="300" cy="300" r="60" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.25" />

      <!-- ── Inner accent rings ── -->
      <circle cx="300" cy="300" r="235" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.2" />
      <circle cx="300" cy="300" r="185" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.18" />
      <circle cx="300" cy="300" r="135" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.15" />
      <circle cx="300" cy="300" r="85" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.15" />

      <!-- ── Crosshair lines (cardinal + diagonal) ── -->
      <!-- Vertical -->
      <line x1="300" y1="30"  x2="300" y2="240" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="8 6" opacity="0.45" />
      <line x1="300" y1="360" x2="300" y2="570" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="8 6" opacity="0.45" />
      <!-- Horizontal -->
      <line x1="30"  y1="300" x2="240" y2="300" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="8 6" opacity="0.45" />
      <line x1="360" y1="300" x2="570" y2="300" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="8 6" opacity="0.45" />
      <!-- Diagonal TL-BR -->
      <line x1="109" y1="109" x2="225" y2="225" stroke="#dc2626" stroke-width="0.6" stroke-dasharray="6 8" opacity="0.3" />
      <line x1="375" y1="375" x2="491" y2="491" stroke="#dc2626" stroke-width="0.6" stroke-dasharray="6 8" opacity="0.3" />
      <!-- Diagonal TR-BL -->
      <line x1="491" y1="109" x2="375" y2="225" stroke="#dc2626" stroke-width="0.6" stroke-dasharray="6 8" opacity="0.3" />
      <line x1="225" y1="375" x2="109" y2="491" stroke="#dc2626" stroke-width="0.6" stroke-dasharray="6 8" opacity="0.3" />

      <!-- ── Small data readout blocks ── -->
      <g class="data-block" fill="#dc2626">
        <rect x="340" y="128" width="14" height="4" rx="1" opacity="0.8" />
        <rect x="344" y="135" width="8"  height="3" rx="1" opacity="0.5" />

        <rect x="430" y="215" width="12" height="4" rx="1" opacity="0.7" />
        <rect x="434" y="222" width="6"  height="3" rx="1" opacity="0.4" />

        <rect x="145" y="390" width="14" height="4" rx="1" opacity="0.75" />
        <rect x="149" y="397" width="9"  height="3" rx="1" opacity="0.45" />

        <rect x="210" y="450" width="10" height="4" rx="1" opacity="0.65" />

        <rect x="400" y="420" width="12" height="4" rx="1" opacity="0.7" />
        <rect x="403" y="427" width="7"  height="3" rx="1" opacity="0.4" />

        <rect x="170" y="175" width="11" height="4" rx="1" opacity="0.6" />
        <rect x="173" y="182" width="7"  height="3" rx="1" opacity="0.35" />

        <rect x="250" y="100" width="13" height="4" rx="1" opacity="0.65" />

        <rect x="455" y="330" width="10" height="4" rx="1" opacity="0.6" />
        <rect x="457" y="337" width="6"  height="3" rx="1" opacity="0.35" />
      </g>

      <!-- ── Small red dots (targets) ── -->
      <circle cx="360" cy="180" r="2.5" fill="#dc2626" opacity="0.8" />
      <circle cx="200" cy="400" r="2"   fill="#dc2626" opacity="0.6" />
      <circle cx="420" cy="370" r="2.5" fill="#dc2626" opacity="0.7" />
      <circle cx="180" cy="220" r="2"   fill="#dc2626" opacity="0.55" />
      <circle cx="390" cy="250" r="1.8" fill="#dc2626" opacity="0.5" />

    </g>
    <!-- END slow-rotating group -->

    <!-- ════════════════════════════════════════════ -->
    <!-- CENTER (does not rotate with HUD)           -->
    <!-- ════════════════════════════════════════════ -->
    <!-- White center circle -->
    <circle cx="300" cy="300" r="8" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.85" />
    <circle cx="300" cy="300" r="3" fill="#fff" opacity="0.9" />
    <!-- Ping ripple -->
    <circle cx="300" cy="300" r="8" fill="none" stroke="#fff" stroke-width="0.8" class="center-ping" />

    <!-- ════════════════════════════════════════════ -->
    <!-- RADAR SWEEP (fast rotation)                 -->
    <!-- ════════════════════════════════════════════ -->
    <!-- Glow trail (blurred, slightly behind) -->
    <g class="sweep-glow">
      <path d="M300,300 L300,30 A270,270 0 0,1 490,110 Z" fill="#dc2626" opacity="0.25" />
    </g>
    <!-- Sharp sweep line -->
    <line x1="300" y1="300" x2="300" y2="30" stroke="#dc2626" stroke-width="1.5" opacity="0.9" class="sweep" />

  </svg>
</div>

<script>
  // ── Procedurally generate degree ticks + numbers ──
  const svg = document.querySelector('svg');
  const ns  = 'http://www.w3.org/2000/svg';
  const cx = 300, cy = 300, outerR = 270;

  const tickGroup = document.createElementNS(ns, 'g');
  tickGroup.classList.add('hud-rotate');

  for (let deg = 0; deg < 360; deg += 2) {
    const rad = (deg - 90) * Math.PI / 180;
    const isMajor = deg % 30 === 0;
    const isMid   = deg % 10 === 0;
    const len = isMajor ? 16 : isMid ? 10 : 4;
    const r1 = outerR - 8;
    const r2 = r1 - len;

    const x1 = cx + r1 * Math.cos(rad);
    const y1 = cy + r1 * Math.sin(rad);
    const x2 = cx + r2 * Math.cos(rad);
    const y2 = cy + r2 * Math.sin(rad);

    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', isMajor ? '#fff' : '#dc2626');
    line.setAttribute('stroke-width', isMajor ? '1.2' : isMid ? '0.8' : '0.4');
    line.setAttribute('opacity', isMajor ? '0.7' : isMid ? '0.4' : '0.2');
    tickGroup.appendChild(line);

    // Degree numbers at major ticks
    if (isMajor) {
      const labelR = r2 - 12;
      const lx = cx + labelR * Math.cos(rad);
      const ly = cy + labelR * Math.sin(rad);
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', lx);
      text.setAttribute('y', ly);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', '#fff');
      text.setAttribute('font-size', '8');
      text.setAttribute('font-family', 'monospace');
      text.setAttribute('opacity', '0.5');
      text.textContent = deg;
      tickGroup.appendChild(text);
    }
  }

  // Inner-ring red tick marks (at r=210)
  for (let deg = 0; deg < 360; deg += 5) {
    const rad = (deg - 90) * Math.PI / 180;
    const isMajor = deg % 30 === 0;
    const len = isMajor ? 10 : 5;
    const r1 = 210;
    const r2 = r1 - len;

    const x1 = cx + r1 * Math.cos(rad);
    const y1 = cy + r1 * Math.sin(rad);
    const x2 = cx + r2 * Math.cos(rad);
    const y2 = cy + r2 * Math.sin(rad);

    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#dc2626');
    line.setAttribute('stroke-width', isMajor ? '0.8' : '0.4');
    line.setAttribute('opacity', isMajor ? '0.45' : '0.2');
    tickGroup.appendChild(line);
  }

  // Inner-ring red tick marks (at r=160)
  for (let deg = 0; deg < 360; deg += 15) {
    const rad = (deg - 90) * Math.PI / 180;
    const len = 6;
    const r1 = 160;
    const r2 = r1 - len;

    const x1 = cx + r1 * Math.cos(rad);
    const y1 = cy + r1 * Math.sin(rad);
    const x2 = cx + r2 * Math.cos(rad);
    const y2 = cy + r2 * Math.sin(rad);

    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#dc2626');
    line.setAttribute('stroke-width', '0.5');
    line.setAttribute('opacity', '0.25');
    tickGroup.appendChild(line);
  }

  svg.insertBefore(tickGroup, svg.querySelector('.sweep-glow'));
</script>

</body>
</html>
